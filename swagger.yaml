openapi: 3.0.0
info:
  title: Eventful API
  description: AltSchool Backend Engineering Capstone Project
  version: 1.0.0
servers:
  - url: http://localhost:5000/api/v1
    description: Local Development Server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

paths:
  /auth/register:
    post:
      summary: Register a new user
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
                - password
              properties:
                name:
                  type: string
                email:
                  type: string
                password:
                  type: string
                role:
                  type: string
                  enum: [creator, eventee]
      responses:
        '201':
          description: User registered successfully

  /events:
    get:
      summary: Get all events (Cached)
      tags: [Events]
      responses:
        '200':
          description: A list of events
          
    post:
      summary: Create a new event
      tags: [Events]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                date:
                  type: string
                  format: date-time
                location:
                  type: string
                price:
                  type: number
                capacity:
                  type: number
      responses:
        '201':
          description: Event created successfully
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (Not a creator)